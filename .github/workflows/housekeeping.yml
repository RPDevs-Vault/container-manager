name: Fleet Housekeeping

on:
  schedule:
    - cron: '0 3 * * 0' # 3 AM every Sunday
  workflow_dispatch: # Allow manual trigger

jobs:
  cleanup:
    name: Runner Maintenance
    runs-on: [self-hosted, linux, heavy]
    steps:
      - name: Prune Docker Layers
        run: |
          echo "Pruning unused Docker data..."
          docker system prune -af --volumes --filter "until=168h" # Remove everything older than 7 days

      - name: Clean Workspace Bloat
        run: |
          echo "Cleaning temporary build artifacts..."
          # Clean up any residual files in the work directory that are not part of the active run
          find /home/runner/_work/ -type d -name "build" -mtime +30 -exec rm -rf {} +

      - name: Clear Ccache (Optional)
        run: |
          if command -v ccache >/dev/null; then
            echo "Optimizing compiler cache..."
            ccache -c
            ccache -z
          fi

      - name: Disk Space Audit
        run: |
          echo "### 📊 Disk Usage Post-Cleanup"
          df -h | grep -E "Filesystem|largedata|root"
