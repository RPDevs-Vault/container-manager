name: OCI Mirroring Engine

on:
  workflow_dispatch:
    inputs:
      image:
        description: 'Upstream image to mirror (e.g. library/alpine:latest)'
        required: true
      target_name:
        description: 'Name in our GHCR (defaults to upstream name)'
        required: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.SYNC_TOKEN }}

      - name: Pull, Tag, and Push
        run: |
          IMAGE="${{ github.event.inputs.image }}"
          TAG_NAME="${{ github.event.inputs.target_name }}"
          
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME=$(echo "$IMAGE" | rev | cut -d/ -f1 | rev | cut -d: -f1)
          fi
          
          TARGET="ghcr.io/rpdevs-vault/$TAG_NAME:latest"
          
          echo "Mirroring $IMAGE to $TARGET..."
          docker pull "$IMAGE"
          docker tag "$IMAGE" "$TARGET"
          docker push "$TARGET"
