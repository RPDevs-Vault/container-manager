name: Docker Asset Collector

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sunday
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Scan Repositories
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          echo "### 🚢 Docker Asset Discovery Report" > discovery_report.md
          echo "Scanning for Docker assets in IamRPDev and RPDevs-Vault..." >> discovery_report.md
          echo "| Repository | Type | File Path |" >> discovery_report.md
          echo "| :--- | :--- | :--- |" >> discovery_report.md

          REPOS=$(gh repo list --limit 1000 --json nameWithOwner --jq '.[].nameWithOwner')

          for repo in $REPOS; do
            echo "Scanning $repo..."
            
            # Search for Dockerfiles
            DOCKERFILES=$(gh api "/repos/$repo/contents" --jq '.[] | select(.name == "Dockerfile" or .name == "docker-compose.yml" or .name == "compose.yaml") | .path' 2>/dev/null)
            
            for file in $DOCKERFILES; do
              TYPE="Dockerfile"
              if [[ "$file" == *"compose"* ]]; then TYPE="Compose"; fi
              echo "| \`$repo\` | $TYPE | [\`$file\`](https://github.com/$repo/blob/main/$file) |" >> discovery_report.md
            done
          done

          gh issue create --repo RPDevs-Vault/container-manager --title "Weekly Docker Asset Discovery" --body-file discovery_report.md --label "enhancement"
