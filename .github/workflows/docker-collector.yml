name: Docker Collector

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch: {}

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan and Collect Assets
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          echo "### 🚢 Docker Asset Discovery Report" > discovery_report.md
          echo "Scanning and collecting Docker assets from IamRPDev and RPDevs-Vault..." >> discovery_report.md
          echo "| Repository | Type | Action Taken |" >> discovery_report.md
          echo "| :--- | :--- | :--- |" >> discovery_report.md

          EXCLUDED="IamRPDev/otaku-api IamRPDev/otaku-ui IamRPDev/llmdata-core IamRPDev/otaku-docker"

          # Scan both User and Organization
          REPOS_USER=$(gh repo list IamRPDev --limit 1000 --json nameWithOwner,isArchived --jq '.[] | select(.isArchived == false) | .nameWithOwner')
          REPOS_ORG=$(gh repo list RPDevs-Vault --limit 1000 --json nameWithOwner,isArchived --jq '.[] | select(.isArchived == false) | .nameWithOwner')
          REPOS="$REPOS_USER $REPOS_ORG"

          for repo in $REPOS; do
            if [[ $EXCLUDED =~ $repo ]]; then
              echo "Skipping excluded repository: $repo"
              continue
            fi

            echo "Scanning $repo..."
            REPO_CLEAN=$(echo "$repo" | sed 's/\//_/g')
            TARGET_DIR="containers/$REPO_CLEAN"
            
            # Search for Dockerfiles and Compose files
            FILES=$(gh api "/repos/$repo/contents" --jq '.[] | select(.name == "Dockerfile" or .name == "docker-compose.yml" or .name == "compose.yaml" or .name == "compose.yml") | .name' 2>/dev/null)
            
            if [[ -n "$FILES" ]]; then
              mkdir -p "$TARGET_DIR"
              
              for file in $FILES; do
                # Download the file
                CONTENT=$(gh api "/repos/$repo/contents/$file" --jq '.content' | base64 -d 2>/dev/null)
                
                if [[ "$file" == "Dockerfile" ]]; then
                  mkdir -p "build/$REPO_CLEAN"
                  echo "$CONTENT" > "build/$REPO_CLEAN/Dockerfile"
                  IMAGE_NAME="ghcr.io/rpdevs-vault/${REPO_CLEAN,,}"
                  echo "docker run -d --name $REPO_CLEAN $IMAGE_NAME:latest" > "$TARGET_DIR/command.txt"
                  echo "| \`$repo\` | Dockerfile | Collected to \`build/$REPO_CLEAN/\` |" >> discovery_report.md
                fi
                
                if [[ "$file" == *"compose"* ]]; then
                  echo "$CONTENT" > "$TARGET_DIR/$file"
                  echo "| \`$repo\` | Compose | Collected to \`$TARGET_DIR/\` |" >> discovery_report.md
                fi
              done

              # Create README.md for the container project
              IMAGE_NAME="ghcr.io/rpdevs-vault/${REPO_CLEAN,,}"
              cat << EOF > "$TARGET_DIR/README.md"
# 📦 $REPO_CLEAN

- **Source Repo:** [\`$repo\`](https://github.com/$repo)
- **Image:** \`$IMAGE_NAME:latest\`
- **Command:** See [\`command.txt\`](./command.txt)
EOF
            fi
          done

          # Commit changes
          git config user.name "Asset Collector"
          git config user.email "actions@github.com"
          git add build/ containers/ images/
          if ! git diff --staged --quiet; then
            git commit -m "feat: automatically collect Docker assets and organize into project folders (User + Org)"
            git push origin main
          fi

          # Post summary to an issue if new assets were found
          if [ -f discovery_report.md ]; then
            gh issue create --repo RPDevs-Vault/container-manager --title "Weekly Docker Asset Collection Summary" --body-file discovery_report.md --label "enhancement"
          fi
