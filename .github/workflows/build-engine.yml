name: Container Build Engine

on:
  push:
    paths:
      - 'build/**'
      - 'images/**'
      - 'manifest.yaml'
      - 'thirdparty.yaml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.SYNC_TOKEN }}

      - name: Clone External Projects
        run: |
          mkdir -p build
          
          # Process manifest.yaml
          if [ -f "manifest.yaml" ]; then
            echo "Processing manifest.yaml..."
            COUNT=$(yq '.projects | length' manifest.yaml)
            for ((i=0; i<COUNT; i++)); do
              NAME=$(yq ".projects[$i].name" manifest.yaml)
              URL=$(yq ".projects[$i].source_url" manifest.yaml)
              BRANCH=$(yq ".projects[$i].branch // \"main\"" manifest.yaml)
              if [ "$URL" != "null" ]; then
                echo "Cloning $NAME from $URL ($BRANCH)..."
                git clone --depth 1 --branch "$BRANCH" "$URL" "build/$NAME" || \
                git clone --depth 1 --branch "master" "$URL" "build/$NAME" || echo "Failed to clone $NAME"
              fi
            done
          fi

          # Process thirdparty.yaml
          if [ -f "thirdparty.yaml" ]; then
            echo "Processing thirdparty.yaml..."
            COUNT=$(yq '.repositories | length' thirdparty.yaml)
            for ((i=0; i<COUNT; i++)); do
              NAME=$(yq ".repositories[$i].name" thirdparty.yaml)
              URL=$(yq ".repositories[$i].url" thirdparty.yaml)
              BRANCH=$(yq ".repositories[$i].branch // \"main\"" thirdparty.yaml)
              if [ "$URL" != "null" ]; then
                echo "Cloning third-party $NAME from $URL ($BRANCH)..."
                git clone --depth 1 --branch "$BRANCH" "$URL" "build/$NAME" || \
                git clone --depth 1 --branch "master" "$URL" "build/$NAME" || echo "Failed to clone $NAME"
              fi
            done
          fi

      - name: Build and Push Projects
        run: |
          # 1. Build everything in ./build/ automatically if it has a Dockerfile
          if [ -d "build" ]; then
            for dir in build/*/; do
              if [ -f "${dir}Dockerfile" ]; then
                PROJECT_NAME=$(basename "$dir")
                IMAGE_NAME="ghcr.io/rpdevs-vault/$PROJECT_NAME"
                
                echo "Building project: $PROJECT_NAME..."
                docker build -t "${IMAGE_NAME,,}:latest" "$dir"
                docker push "${IMAGE_NAME,,}:latest"
              fi
            done
          fi

          # 2. Build everything in ./images/ automatically
          if [ -d "images" ]; then
            for dir in images/*/; do
              if [ -f "${dir}Dockerfile" ]; then
                IMAGE_BASE=$(basename "$dir")
                IMAGE_NAME="ghcr.io/rpdevs-vault/personal-$IMAGE_BASE"
                
                echo "Building personal image: $IMAGE_BASE..."
                docker build -t "${IMAGE_NAME,,}:latest" "$dir"
                docker push "${IMAGE_NAME,,}:latest"
              fi
            done
          fi
