name: Container Build Engine

on:
  push:
    paths:
      - 'build/**'
      - 'images/**'
      - 'runners/**'
      - 'manifest.yaml'
      - 'thirdparty.yaml'
  workflow_dispatch:

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: set-matrix
        run: |
          # 1. Collect local builds
          LOCAL_JSON=$(ls -d build/*/ 2>/dev/null | xargs -n 1 basename | jq -R -s -c 'split("\n")[:-1] | map({name: ., source: "local", dir: "build/" + .})')
          if [ -z "$LOCAL_JSON" ]; then LOCAL_JSON="[]"; fi

          # 2. Collect runners
          RUNNER_JSON=$(ls -d runners/*/ 2>/dev/null | xargs -n 1 basename | jq -R -s -c 'split("\n")[:-1] | map({name: "runner-" + ., source: "runner", dir: "runners/" + .})')
          if [ -z "$RUNNER_JSON" ]; then RUNNER_JSON="[]"; fi

          # 3. Collect manifest projects
          MANIFEST_JSON=$(yq -o=json -c '.projects // []' manifest.yaml | jq -c 'map(. + {source: "manifest", dir: "build/" + .name})')
          
          # 4. Collect thirdparty projects
          THIRDPARTY_JSON=$(yq -o=json -c '.repositories // []' thirdparty.yaml | jq -c 'map(. + {source: "thirdparty", dir: "build/" + .name})')

          # Merge all into a single array
          FULL_MATRIX=$(echo "$LOCAL_JSON $RUNNER_JSON $MANIFEST_JSON $THIRDPARTY_JSON" | jq -s -c 'add')
          echo "matrix=$FULL_MATRIX" >> $GITHUB_OUTPUT

  build:
    needs: setup-matrix
    if: needs.setup-matrix.outputs.matrix != '[]'
    strategy:
      fail-fast: false
      matrix: 
        project: ${{ fromJSON(needs.setup-matrix.outputs.matrix) }}
    
    # Priority: Self-hosted Vault Builder
    runs-on: [self-hosted, vault-builder]
    continue-on-error: true
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.SYNC_TOKEN }}

      - name: Prepare Source
        run: |
          NAME="${{ matrix.project.name }}"
          DIR="${{ matrix.project.dir }}"
          URL="${{ matrix.project.source_url || matrix.project.url }}"
          BRANCH="${{ matrix.project.branch || 'main' }}"
          
          if [[ "${{ matrix.project.source }}" == "manifest" || "${{ matrix.project.source }}" == "thirdparty" ]]; then
            echo "Cloning $NAME from $URL ($BRANCH)..."
            mkdir -p build
            rm -rf "$DIR"
            git clone --depth 1 --branch "$BRANCH" "$URL" "$DIR" || \
            git clone --depth 1 --branch "master" "$URL" "$DIR" || echo "Failed to clone $NAME"
          fi

      - name: Archive and Organize
        run: |
          NAME="${{ matrix.project.name }}"
          DIR="${{ matrix.project.dir }}"
          
          if [ -d "$DIR" ]; then
            rm -rf "$DIR/.git" 2>/dev/null || true
            mkdir -p "containers/$NAME"
            IMAGE_NAME="ghcr.io/rpdevs-vault/${NAME,,}"
            
            echo "docker run -d --name $NAME $IMAGE_NAME:latest" > "containers/$NAME/command.txt"
            cat << EOF > "containers/$NAME/README.md"
# 📦 $NAME
- **Image:** \`$IMAGE_NAME:latest\`
- **Type:** ${{ matrix.project.source }}
- **Registry:** [GHCR](https://github.com/orgs/RPDevs-Vault/packages/container/${NAME,,})
- **Last Built:** $(date)
EOF
            mkdir -p images
            echo "# 📦 $NAME" > "images/$NAME.md"
            echo "Image: \`$IMAGE_NAME:latest\`" >> "images/$NAME.md"

            git config user.name "Fleet Archiver"
            git config user.email "actions@github.com"
            git add .
            if ! git diff --staged --quiet; then
              git commit -m "chore(archiver): update $NAME source and assets"
              git push origin main
            fi
          fi

      - name: Build and Push
        run: |
          NAME="${{ matrix.project.name }}"
          DIR="${{ matrix.project.dir }}"
          IMAGE_NAME="ghcr.io/rpdevs-vault/${NAME,,}"
          
          if [ -f "$DIR/Dockerfile" ] || [ -f "$DIR/dockerfile" ]; then
            echo "Building $NAME..."
            DOCKERFILE=$(ls "$DIR" | grep -i "^dockerfile$" | head -n 1)
            docker build -f "$DIR/$DOCKERFILE" -t "$IMAGE_NAME:latest" "$DIR"
            docker push "$IMAGE_NAME:latest"
          fi

  build-fallback:
    needs: [setup-matrix, build]
    if: failure() || cancelled()
    strategy:
      fail-fast: false
      matrix: 
        project: ${{ fromJSON(needs.setup-matrix.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_TOKEN }}
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.SYNC_TOKEN }}
      - name: Build and Push (Cloud Fallback)
        run: |
          NAME="${{ matrix.project.name }}"
          DIR="${{ matrix.project.dir }}"
          IMAGE_NAME="ghcr.io/rpdevs-vault/${NAME,,}"
          
          if [ -f "$DIR/Dockerfile" ] || [ -f "$DIR/dockerfile" ]; then
            echo "Building $NAME (Cloud)..."
            DOCKERFILE=$(ls "$DIR" | grep -i "^dockerfile$" | head -n 1)
            docker build -f "$DIR/$DOCKERFILE" -t "$IMAGE_NAME:latest" "$DIR"
            docker push "$IMAGE_NAME:latest"
          fi
